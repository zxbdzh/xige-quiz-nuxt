services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: "https://registry.npmmirror.com"
    container_name: xige-quiz
    restart: unless-stopped
    # host 网络:容器共用宿主机网络栈,127.0.0.1 直通,可直接访问宿主机上的 mihomo 代理
    # 代价:端口映射(ports)失效,容器直接绑定宿主机 3000 端口,效果等同
    network_mode: host
    volumes:
      # 持久化 SQLite 数据库
      - quiz_data:/app/data
    # 生产环境配置:用 env_file 注入到进程环境变量
    # (node .output/server/index.mjs 直接起服务时不会读 .env 文件,
    #  必须由 docker 把变量注入容器环境,better-auth / GitHub 凭据才能生效)
    env_file:
      - ./prod.env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai

volumes:
  quiz_data:
    driver: local
