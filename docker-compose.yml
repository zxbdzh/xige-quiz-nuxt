services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: "https://registry.npmmirror.com"
    container_name: xige-quiz
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 持久化 SQLite 数据库
      - quiz_data:/app/data
    # 生产环境配置:用 env_file 注入到进程环境变量
    # (node .output/server/index.mjs 直接起服务时不会读 .env 文件,
    #  必须由 docker 把变量注入容器环境,better-auth / GitHub 凭据才能生效)
    env_file:
      - ./prod.env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    # 允许容器内用 host.docker.internal 访问宿主机上的代理(GitHub OAuth 出网)
    # 若 prod.env 里设了 HTTPS_PROXY=http://host.docker.internal:端口 才需要
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  quiz_data:
    driver: local
